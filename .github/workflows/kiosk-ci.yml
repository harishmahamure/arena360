name: Kiosk CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/kiosk/**'
      - 'packages/**'
      - '.github/workflows/kiosk-ci.yml'
  pull_request:
    paths:
      - 'apps/kiosk/**'
      - 'packages/**'
      - '.github/workflows/kiosk-ci.yml'
  # Allow building a downloadable Windows executable on demand from the
  # Actions tab (Run workflow). No Windows machine required.
  workflow_dispatch:

env:
  VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.arena360.cloud' }}
  VITE_API_URL_WS: ${{ vars.VITE_API_URL_WS || 'wss://api.arena360.cloud' }}
  VITE_GALLERY_URL: ${{ vars.VITE_GALLERY_URL || 'https://cdn.arena360.cloud/kiosk/gallery.json' }}
  VITE_LOGIN_BACKGROUND_VIDEO_URL: ${{ vars.VITE_LOGIN_BACKGROUND_VIDEO_URL || 'https://cdn.arena360.cloud/launch.webm' }}
  VITE_KIOSK_LOGO_URL: ${{ vars.VITE_KIOSK_LOGO_URL || '' }}
  VITE_OFFLINE_GRACE_MINUTES: ${{ vars.VITE_OFFLINE_GRACE_MINUTES || '5' }}

jobs:
  kiosk-windows:
    name: Build & test kiosk (windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo (kiosk)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/kiosk/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust clippy (kiosk)
        run: cargo clippy --all-targets --manifest-path apps/kiosk/src-tauri/Cargo.toml -- -D warnings

      # Inject the kiosk's build-time config. Vite bakes these into the web
      # bundle at build time (not runtime). Override via Settings > Variables.
      - name: Tauri build (Windows bundle)
        run: |
          echo "VITE_API_URL: $env:VITE_API_URL"
          echo "VITE_API_URL_WS: $env:VITE_API_URL_WS"
          echo "VITE_GALLERY_URL: $env:VITE_GALLERY_URL"
          echo "VITE_LOGIN_BACKGROUND_VIDEO_URL: $env:VITE_LOGIN_BACKGROUND_VIDEO_URL"
          echo "VITE_OFFLINE_GRACE_MINUTES: $env:VITE_OFFLINE_GRACE_MINUTES"
          pnpm --filter @gaming-cafe/kiosk tauri:build

      # Publish the installers so they can be downloaded from the workflow
      # run's "Artifacts" section. The NSIS installer (.exe) is the
      # recommended kiosk distributable (perMachine install).
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: gaming-cafe-kiosk-windows
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/kiosk/src-tauri/target/release/bundle/nsis/*.exe
            apps/kiosk/src-tauri/target/release/bundle/msi/*.msi
