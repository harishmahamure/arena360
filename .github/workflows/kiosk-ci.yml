name: Kiosk CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/kiosk/**'
      - 'packages/**'
      - '.github/workflows/kiosk-ci.yml'
  pull_request:
    paths:
      - 'apps/kiosk/**'
      - 'packages/**'
      - '.github/workflows/kiosk-ci.yml'
  # Allow building a downloadable Windows executable on demand from the
  # Actions tab (Run workflow). No Windows machine required.
  workflow_dispatch:

jobs:
  kiosk-windows:
    name: Build & test kiosk (windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo (kiosk)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/kiosk/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust clippy (kiosk)
        run: cargo clippy --all-targets --manifest-path apps/kiosk/src-tauri/Cargo.toml -- -D warnings

      # Inject the kiosk's build-time config. VITE_API_URL is baked into the
      # web bundle by Vite at build time, so it must be set here (not at
      # runtime). Configure it as a repo/environment variable in
      # Settings > Secrets and variables > Actions > Variables.
      - name: Tauri build (Windows bundle)
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://192.168.50.218:3001' }}
        run: pnpm --filter @gaming-cafe/kiosk tauri:build

      # Publish the installers so they can be downloaded from the workflow
      # run's "Artifacts" section. The NSIS installer (.exe) is the
      # recommended kiosk distributable (perMachine install).
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: gaming-cafe-kiosk-windows
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/kiosk/src-tauri/target/release/bundle/nsis/*.exe
            apps/kiosk/src-tauri/target/release/bundle/msi/*.msi
