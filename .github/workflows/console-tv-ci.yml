name: Console TV CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/console-tv/**'
      - '.github/workflows/console-tv-ci.yml'
  pull_request:
    paths:
      - 'apps/console-tv/**'
      - '.github/workflows/console-tv-ci.yml'
  workflow_dispatch:

jobs:
  android:
    name: Test & debug build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/console-tv
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run unit tests and assemble debug
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleDebug --stacktrace
