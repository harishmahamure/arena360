name: Release Kiosk (Windows)

# Manual release (ADR-0028): bump the kiosk version, build a signed Windows
# installer with Tauri updater artifacts, and publish them + latest.json to a
# GitHub Release that the deployed kiosks' update manager polls.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.arena360.cloud' }}
  VITE_API_URL_WS: ${{ vars.VITE_API_URL_WS || 'wss://api.arena360.cloud' }}

jobs:
  release:
    name: Bump, build & publish kiosk
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (kiosk)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/kiosk/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        id: bump
        shell: bash
        run: node apps/kiosk/scripts/set-version.mjs "${{ inputs.bump }}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release
        shell: bash
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(kiosk): release v${VERSION}"
          git tag "kiosk-v${VERSION}"
          git push origin HEAD --follow-tags

      # ADR-0028: inject the updater runtime config (public key + GitHub Releases
      # endpoint) and enable updater artifacts only for release builds. Kept out
      # of the committed tauri.conf.json so kiosk-ci.yml builds without keys and
      # no key material lives in the repo.
      - name: Write updater config overlay
        shell: bash
        env:
          PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PUBKEY" ]; then
            echo "::error::Missing repository variable TAURI_UPDATER_PUBKEY (the Tauri updater public key). Generate a keypair with 'pnpm --filter @gaming-cafe/kiosk exec tauri signer generate', set the public key as the Actions variable and the private key as TAURI_SIGNING_PRIVATE_KEY."
            exit 1
          fi
          cat > apps/kiosk/src-tauri/tauri.updater.conf.json <<EOF
          {
            "bundle": { "createUpdaterArtifacts": true },
            "plugins": {
              "updater": {
                "pubkey": "${PUBKEY}",
                "endpoints": [
                  "https://github.com/${REPO}/releases/latest/download/latest.json"
                ]
              }
            }
          }
          EOF

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/kiosk
          tagName: kiosk-v${{ steps.bump.outputs.version }}
          releaseName: "Kiosk v${{ steps.bump.outputs.version }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --config src-tauri/tauri.updater.conf.json

      - name: Release summary
        shell: bash
        run: |
          {
            echo "## Kiosk Release"
            echo ""
            echo "- Version: \`${{ steps.bump.outputs.version }}\`"
            echo "- Tag: \`kiosk-v${{ steps.bump.outputs.version }}\`"
            echo "- API URL: \`${{ env.VITE_API_URL }}\`"
            echo "- WebSocket URL: \`${{ env.VITE_API_URL_WS }}\`"
            echo "- Update endpoint: \`https://github.com/${{ github.repository }}/releases/latest/download/latest.json\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
