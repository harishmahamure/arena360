name: Deploy Backend to Production

on:
  workflow_dispatch:

env:
  DOCKER_REPO: "${{ secrets.DOCKERHUB_REPO || 'harishmahamure/arena360' }}"
  RELEASE_NAME: arena360-backend
  NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Extract Git commit SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:backend-prod-${{ steps.vars.outputs.short_sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.0

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo '${{ secrets.KUBE_CONFIG }}' > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Run database migrations
        run: |
          echo "Running database migrations from the CI runner... ${{ secrets.MIGRATION_DATABASE_URL }}"
        env:
          DATABASE_URL: "${{ secrets.MIGRATION_DATABASE_URL }}"
        run: |
          sqlx migrate run --source apps/backend/migrations
          echo "Database migrations completed"

      - name: Deploy backend
        run: |
          helm upgrade --install "${{ env.RELEASE_NAME }}" ./infra/helm/backend \
            --values ./infra/helm/backend/values-prod.yaml \
            --set-string image.repository="${{ env.DOCKER_REPO }}" \
            --set-string image.tag="backend-prod-${{ steps.vars.outputs.short_sha }}" \
            --set-string inlineSecretEnv.DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set-string inlineSecretEnv.JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --set-string inlineSecretEnv.ZEPTOMAIL_TOKEN="${{ secrets.ZEPTOMAIL_TOKEN }}" \
            --set-string inlineSecretEnv.STORAGE_ENDPOINT="${{ secrets.STORAGE_ENDPOINT }}" \
            --set-string inlineSecretEnv.STORAGE_BUCKET="${{ secrets.STORAGE_BUCKET }}" \
            --set-string inlineSecretEnv.STORAGE_ACCESS_KEY="${{ secrets.STORAGE_ACCESS_KEY }}" \
            --set-string inlineSecretEnv.STORAGE_SECRET_KEY="${{ secrets.STORAGE_SECRET_KEY }}" \
            --set-string inlineSecretEnv.STORAGE_PUBLIC_URL="${{ secrets.STORAGE_PUBLIC_URL }}" \
            --namespace "${{ env.NAMESPACE }}" \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Deployment summary
        run: |
          echo "## Backend Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release: \`${{ env.RELEASE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.DOCKER_REPO }}:backend-prod-${{ steps.vars.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
