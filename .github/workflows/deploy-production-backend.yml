name: Deploy Backend to Production

on:
  workflow_dispatch:

env:
  DOCKER_REPO: "${{ secrets.DOCKERHUB_REPO || 'harishmahamure/arena360' }}"
  RELEASE_NAME: arena360-backend
  NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Extract Git commit SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:backend-prod-${{ steps.vars.outputs.short_sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.0

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo '${{ secrets.KUBE_CONFIG }}' > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Upsert backend secret
        run: |
          kubectl create secret generic arena360-backend-secrets \
            --namespace "${{ env.NAMESPACE }}" \
            --from-literal=DATABASE_URL='${{ secrets.DATABASE_URL }}' \
            --from-literal=MIGRATION_DATABASE_URL='${{ secrets.MIGRATION_DATABASE_URL }}' \
            --from-literal=JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            --from-literal=ZEPTOMAIL_TOKEN='${{ secrets.ZEPTOMAIL_TOKEN }}' \
            --from-literal=STORAGE_ENDPOINT='${{ secrets.STORAGE_ENDPOINT }}' \
            --from-literal=STORAGE_BUCKET='${{ secrets.STORAGE_BUCKET }}' \
            --from-literal=STORAGE_ACCESS_KEY='${{ secrets.STORAGE_ACCESS_KEY }}' \
            --from-literal=STORAGE_SECRET_KEY='${{ secrets.STORAGE_SECRET_KEY }}' \
            --from-literal=STORAGE_PUBLIC_URL='${{ secrets.STORAGE_PUBLIC_URL }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Upload backend migrations
        run: |
          kubectl create configmap arena360-backend-migrations \
            --namespace "${{ env.NAMESPACE }}" \
            --from-file=apps/backend/migrations \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run database migrations
        run: |
          kubectl delete job arena360-backend-migrate --namespace "${{ env.NAMESPACE }}" --ignore-not-found
          cat <<'EOF' | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: arena360-backend-migrate
            namespace: ${{ env.NAMESPACE }}
          spec:
            backoffLimit: 1
            activeDeadlineSeconds: 1200
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: arena360-backend-migrate
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: rust:1.82-slim
                    imagePullPolicy: IfNotPresent
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: arena360-backend-secrets
                            key: MIGRATION_DATABASE_URL
                    command:
                      - /bin/sh
                      - -ec
                      - |
                        apt-get update
                        apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates
                        cargo install sqlx-cli --no-default-features --features rustls,postgres --locked
                        sqlx migrate run --source /migrations
                    volumeMounts:
                      - name: migrations
                        mountPath: /migrations
                        readOnly: true
                volumes:
                  - name: migrations
                    configMap:
                      name: arena360-backend-migrations
          EOF
          kubectl wait --for=condition=complete job/arena360-backend-migrate \
            --namespace "${{ env.NAMESPACE }}" \
            --timeout=20m

      - name: Deploy backend
        run: |
          helm upgrade --install "${{ env.RELEASE_NAME }}" ./infra/helm/backend \
            --values ./infra/helm/backend/values-prod.yaml \
            --set-string image.repository="${{ env.DOCKER_REPO }}" \
            --set-string image.tag="backend-prod-${{ steps.vars.outputs.short_sha }}" \
            --namespace "${{ env.NAMESPACE }}" \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Deployment summary
        run: |
          echo "## Backend Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release: \`${{ env.RELEASE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.DOCKER_REPO }}:backend-prod-${{ steps.vars.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
