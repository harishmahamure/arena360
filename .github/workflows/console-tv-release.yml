name: Release Console TV (Android)

# Manual release: build signed AAB + APK with Fastlane and attach to a GitHub Release.
# Requires ANDROID_KEYSTORE_* repository secrets (see apps/console-tv/README.md).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. console-tv-v0.1.0)"
        required: true
        type: string
      release_name:
        description: "GitHub release title"
        required: false
        type: string
        default: "Console TV release"

permissions:
  contents: write

env:
  KEYSTORE_PATH: apps/console-tv/release/console-tv.jks

jobs:
  release:
    name: Build signed Android artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/console-tv
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Fastlane
        run: bundle install

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing repository secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          mkdir -p release
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release/console-tv.jks

      - name: Build signed release artifacts
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/console-tv/release/console-tv.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          gh release create "$TAG" \
            --title "$RELEASE_NAME" \
            --notes "Signed Console TV Android release (AAB + APK)." \
            fastlane/build/*.aab \
            fastlane/build/*.apk

      - name: Scrub keystore
        if: always()
        run: rm -f release/console-tv.jks

      - name: Release summary
        run: |
          {
            echo "## Console TV Android release"
            echo ""
            echo "- Tag: \`${{ inputs.tag }}\`"
            echo "- Artifacts: signed AAB + APK in GitHub Release"
          } >> "$GITHUB_STEP_SUMMARY"
