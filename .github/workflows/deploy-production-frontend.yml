name: Deploy Frontend to Production

on:
  workflow_dispatch:

env:
  DOCKER_REPO: "${{ secrets.DOCKERHUB_REPO || 'harishmahamure/arena360' }}"
  RELEASE_NAME: arena360-frontend-new
  NAMESPACE: default
  VITE_BASE_PATH: /v2/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Extract Git commit SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://api.arena360.cloud' }}
            VITE_GATEWAY_URL=${{ vars.VITE_GATEWAY_URL || 'wss://api.arena360.cloud/realtime' }}
            VITE_BASE_PATH=${{ env.VITE_BASE_PATH }}
          tags: |
            ${{ env.DOCKER_REPO }}:frontend-prod-${{ steps.vars.outputs.short_sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.0

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo '${{ secrets.KUBE_CONFIG }}' > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Deploy frontend
        run: |
          helm upgrade --install "${{ env.RELEASE_NAME }}" ./infra/helm/frontend \
            --values ./infra/helm/frontend/values-prod.yaml \
            --set-string image.repository="${{ env.DOCKER_REPO }}" \
            --set-string image.tag="frontend-prod-${{ steps.vars.outputs.short_sha }}" \
            --namespace "${{ env.NAMESPACE }}" \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Deployment summary
        run: |
          echo "## Frontend Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release: \`${{ env.RELEASE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.DOCKER_REPO }}:frontend-prod-${{ steps.vars.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ingress path: \`admin.<domain>/v2\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
