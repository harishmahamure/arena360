<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-TileColor" content="#0b0f1a" />
    <meta name="msapplication-TileImage" content="/mstile-150x150.png" />
    <meta name="theme-color" content="#ff6900" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
    <title>Arena360 Station Management</title>
    <style>
      html,
      body {
        margin: 0;
        background: #0b0f1a;
        color: #e8ecf4;
        font-family: system-ui, sans-serif;
      }

      #root {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .boot-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        text-align: center;
      }

      .boot-loading-spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid #2a3550;
        border-top-color: #ff6900;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }

      .boot-loading-text {
        margin: 0;
        color: #94a3b8;
        font-size: 1rem;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(() => {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          root.innerHTML =
            '<div class="boot-loading" role="alert">' +
            '<p class="boot-loading-text" style="color:#ff6900">Station failed to start</p>' +
            '<p class="boot-loading-text">JavaScript did not load. Check the install or network.</p>' +
            '</div>';
        }
      }, 15000);
    </script>
  </body>
</html>
