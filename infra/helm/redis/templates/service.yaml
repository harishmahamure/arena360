apiVersion: v1
kind: Service
metadata:
  name: {{ include "arena360-redis.serviceName" . }}
  labels:
    {{- include "arena360-redis.labels" . | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "arena360-redis.selectorLabels" . | nindent 4 }}
