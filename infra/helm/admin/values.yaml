# ============================================
# Admin Panel - Default Helm Values
# ============================================
# Override these values for different environments
# using values-uat.yaml or values-prod.yaml

# -- Global settings
global:
  # -- Image pull secrets for private registries
  imagePullSecrets:
    - name: dockerhub-secret

# -- Number of replicas
replicaCount: 1

# -- Image configuration
image:
  repository: your-registry.com/admin-panel
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

# -- Service account configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext:
  fsGroup: 101

# -- Container security context
securityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# -- Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 80
  annotations: {}

# -- Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: admin.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: admin-tls
  #    hosts:
  #      - admin.example.com

# -- Resource limits and requests
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# -- Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Liveness probe configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# -- Readiness probe configuration
readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# ============================================
# Environment Variables Configuration
# ============================================
# These values are injected at runtime into the container

env:
  # -- Backend API URL
  VITE_API_URL: "http://localhost:3001"
  # -- WebSocket Gateway URL
  VITE_GATEWAY_URL: "ws://localhost:3002"

# -- Additional environment variables from secrets
envFromSecrets: []
  # - name: my-secret
  #   key: secret-key
  #   envName: MY_SECRET_VAR

# -- ConfigMap for environment variables (auto-created)
configMap:
  enabled: true

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# -- Network Policy
networkPolicy:
  enabled: false
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx






