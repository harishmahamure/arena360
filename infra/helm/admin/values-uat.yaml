# ============================================
# Admin Panel - UAT Environment Values
# ============================================
# Usage: helm install admin-panel ./helm/admin-panel -f ./helm/admin-panel/values-uat.yaml

# -- Global settings
global:
  # -- Image pull secrets for Docker Hub private registry
  imagePullSecrets:
    - name: dockerhub-secret

replicaCount: 1

image:
  repository: harishmahamure/arena360
  tag: "admin-panel-uat-latest"
  pullPolicy: Always

# ============================================
# UAT Environment Variables
# ============================================
env:
  VITE_API_URL: "https://api-uat.arena360.cloud/backend"
  VITE_GATEWAY_URL: "http://ws.arena360.cloud"

# -- Ingress for UAT
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: admin-uat.arena360.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: admin-uat-tls
      hosts:
        - admin-uat.arena360.cloud

# -- Resources for UAT (lower than prod)
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# -- Autoscaling for UAT
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

# -- Pod Disruption Budget for UAT
podDisruptionBudget:
  enabled: true
  minAvailable: 1
