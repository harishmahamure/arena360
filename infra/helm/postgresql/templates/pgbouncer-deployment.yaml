{{- if .Values.pgbouncer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arena360-postgresql.fullname" . }}-pgbouncer
  labels:
    {{- include "arena360-postgresql.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  replicas: {{ .Values.pgbouncer.replicaCount }}
  selector:
    matchLabels:
      {{- include "arena360-postgresql.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgbouncer
  template:
    metadata:
      labels:
        {{- include "arena360-postgresql.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          env:
            - name: DATABASES_HOST
              value: {{ include "arena360-postgresql.postgresServiceName" . | quote }}
            - name: DATABASES_PORT
              value: {{ .Values.postgresql.service.port | quote }}
            - name: DATABASES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: DATABASES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "arena360-postgresql.secretName" . }}
                  key: {{ .Values.postgresql.auth.passwordKey }}
            - name: DATABASES_DBNAME
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: PGBOUNCER_AUTH_TYPE
              value: plain
            - name: PGBOUNCER_POOL_MODE
              value: {{ .Values.pgbouncer.config.poolMode | quote }}
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.config.maxClientConn | quote }}
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.config.defaultPoolSize | quote }}
            - name: PGBOUNCER_RESERVE_POOL_SIZE
              value: {{ .Values.pgbouncer.config.reservePoolSize | quote }}
          ports:
            - name: pgbouncer
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
