# Port map (in-cluster; independent of any Postgres on the VPS host :5432):
#   postgres pod/service     -> postgresql.service.port (5432)
#   pgbouncer pod              -> pgbouncer.containerPort (6432)
#   pgbouncer ClusterIP        -> pgbouncer.service.port (6432, targets 6432)
#   pgbouncer NodePort (prod)  -> externalService.nodePort 30433 -> 6432
# PgBouncer backend uses postgresql.service.port to reach Postgres (DATABASES_PORT).
postgresql:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: arena360
    database: arena360
    existingSecret: arena360-postgresql-secrets
    passwordKey: password
    postgresPasswordKey: postgres-password
  service:
    type: ClusterIP
    # Postgres listen + Service port (PgBouncer DATABASES_PORT uses this).
    port: 5432
  persistence:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

pgbouncer:
  enabled: true
  image:
    repository: pgbouncer/pgbouncer
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  # PgBouncer listen port inside the pod (PGBOUNCER_LISTEN_PORT).
  containerPort: 6432
  service:
    type: ClusterIP
    # In-cluster clients connect here; must match containerPort, not Postgres 5432.
    port: 6432
  externalService:
    enabled: false
    type: NodePort
    port: 5433
    nodePort: 30433
    annotations: {}
    loadBalancerIP: ""
  auth:
    existingSecret: arena360-postgresql-secrets
    userlistKey: pgbouncer-users.txt
  config:
    poolMode: session
    maxClientConn: 200
    defaultPoolSize: 25
    reservePoolSize: 5
    serverResetQuery: DISCARD ALL
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

secret:
  create: false
  name: arena360-postgresql-secrets
  password: ""
  postgresPassword: ""
  # PgBouncer expects lines such as: "arena360" "plain-text-or-md5-password"
  pgbouncerUsers: ""

nameOverride: ""
fullnameOverride: ""
nodeSelector: {}
tolerations: []
affinity: {}

imagePullSecrets:
  - name: dockerhub-secret
