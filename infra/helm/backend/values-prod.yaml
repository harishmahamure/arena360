image:
  repository: harishmahamure/arena360
  tag: backend-prod-latest
  pullPolicy: Always

imagePullSecrets:
  - name: dockerhub-secret

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.arena360.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: arena360-backend-prod-tls
      hosts:
        - api.arena360.cloud

env:
  PORT: "3000"
  RUST_ENV: production
  DATABASE_MAX_CONNECTIONS: "10"
  JWT_ACCESS_EXPIRATION: 15m
  JWT_PLAYER_EXPIRATION: 24h
  JWT_DEVICE_EXPIRATION: 365d
  BCRYPT_SALT_ROUNDS: "10"
  CAFE_TZ: Asia/Kolkata
  STORAGE_REGION: us-east-1
  STORAGE_PRESIGN_EXPIRY_SECS: "900"

# Production uses GitHub Actions secrets inlined at deploy time (ADR-0026).
envFromSecrets: []
inlineSecretEnv: {}
